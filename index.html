<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メモ帳</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #f7f4ef;
      color: #3d3d3d;
      min-height: 100vh;
    }

    header {
      background: #6b8f71;
      color: #fff;
      padding: 1rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* --- Form --- */
    .form-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 1.25rem;
      margin-bottom: 1.75rem;
    }
    .form-card h2 {
      font-size: 1rem;
      color: #6b8f71;
      margin-bottom: 0.9rem;
    }

    .form-card input {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      color: #3d3d3d;
      background: #fafaf8;
      transition: border-color 0.2s;
      margin-bottom: 0.65rem;
    }
    .form-card input:focus {
      outline: none;
      border-color: #6b8f71;
      background: #fff;
    }

    /* --- Rich text toolbar --- */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.5rem;
      background: #f4f4f0;
      border: 1.5px solid #ddd;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
    }
    .toolbar button {
      min-width: 2rem;
      height: 2rem;
      padding: 0 0.4rem;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
      line-height: 1;
    }
    .toolbar button:hover { background: #e8e8e8; }
    .toolbar button.active { background: #d0e4d3; border-color: #6b8f71; }
    .toolbar .color-wrap {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.8rem;
      color: #666;
    }
    .toolbar input[type="color"] {
      width: 2rem;
      height: 2rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 0.1rem;
      cursor: pointer;
      background: #fff;
    }

    /* --- Contenteditable editor --- */
    .editor {
      width: 100%;
      height: calc(10 * 1.55 * 0.95rem);
      overflow-y: auto;
      border: 1.5px solid #ddd;
      border-radius: 0 0 6px 6px;
      padding: 0.6rem 0.75rem;
      font-size: 0.95rem;
      color: #3d3d3d;
      background: #fafaf8;
      line-height: 1.55;
      word-break: break-word;
      transition: border-color 0.2s;
      margin-bottom: 0.9rem;
    }
    .editor:focus { outline: none; border-color: #6b8f71; background: #fff; }
    .editor:empty::before {
      content: attr(data-placeholder);
      color: #aaa;
      pointer-events: none;
    }

    .btn-add {
      display: block;
      width: 100%;
      padding: 0.7rem;
      background: #6b8f71;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #577a5c; }

    /* --- Error message --- */
    .error-msg {
      color: #c0756a;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
      min-height: 1.2em;
    }

    /* --- Memo list --- */
    .section-title {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 0.9rem;
      letter-spacing: 0.03em;
    }

    .memo-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    .memo-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 1rem 1.1rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .memo-card__title {
      font-size: 1rem;
      font-weight: 600;
      color: #3d3d3d;
      word-break: break-word;
    }
    .memo-card__body {
      font-size: 0.875rem;
      color: #666;
      word-break: break-word;
      line-height: 1.55;
      max-height: calc(10 * 1.55 * 0.875rem);
      overflow-y: auto;
    }
    .memo-card__footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }
    .memo-card__date {
      font-size: 0.75rem;
      color: #aaa;
    }
    .card-actions { display: flex; gap: 0.4rem; }
    .btn-edit {
      background: none;
      border: 1.5px solid #8fa8c8;
      color: #8fa8c8;
      border-radius: 5px;
      padding: 0.2rem 0.65rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-edit:hover { background: #8fa8c8; color: #fff; }
    .btn-delete {
      background: none;
      border: 1.5px solid #c0756a;
      color: #c0756a;
      border-radius: 5px;
      padding: 0.2rem 0.65rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-delete:hover { background: #c0756a; color: #fff; }
    .form-card.is-editing { border: 2px solid #8fa8c8; }
    .form-card.is-editing h2 { color: #8fa8c8; }
    .btn-cancel {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.55rem;
      background: none;
      border: 1.5px solid #bbb;
      color: #888;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-cancel:hover { background: #f0f0f0; }

    .empty-state {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 2rem 0;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>📝 メモ帳</h1>
</header>

<main>
  <div class="form-card" id="form-card">
    <h2 id="form-title">新しいメモを追加</h2>
    <input type="text" id="memo-title" placeholder="タイトル（必須）" maxlength="80" />
    <div class="toolbar" id="toolbar">
      <button data-cmd="bold" title="太字"><b>B</b></button>
      <button data-cmd="italic" title="斜体"><i>I</i></button>
      <button data-cmd="underline" title="下線"><u>U</u></button>
      <label class="color-wrap" title="文字色">
        <span>色</span>
        <input type="color" id="color-picker" value="#3d3d3d" />
      </label>
    </div>
    <div class="editor" id="memo-body" contenteditable="true" data-placeholder="本文（任意）"></div>
    <p class="error-msg" id="error-msg"></p>
    <button class="btn-add" id="btn-add">追加する</button>
    <button class="btn-cancel" id="btn-cancel" style="display:none">キャンセル</button>
  </div>

  <p class="section-title" id="section-title"></p>
  <div class="memo-grid" id="memo-grid"></div>
</main>

<script>
  const STORAGE_KEY = 'memos_v1';
  let editingId = null;

  function loadMemos() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function saveMemos(memos) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(memos));
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderMemos() {
    const memos = loadMemos();
    const grid = document.getElementById('memo-grid');
    const sectionTitle = document.getElementById('section-title');

    grid.innerHTML = '';
    sectionTitle.textContent = memos.length ? `メモ一覧（${memos.length}件）` : '';

    if (memos.length === 0) {
      grid.innerHTML = '<p class="empty-state">メモがありません。<br>上のフォームから追加してみましょう！</p>';
      return;
    }

    memos.slice().reverse().forEach(memo => {
      const card = document.createElement('div');
      card.className = 'memo-card';
      card.innerHTML = `
        <div class="memo-card__title">${escapeHtml(memo.title)}</div>
        ${memo.body ? `<div class="memo-card__body">${memo.body}</div>` : ''}
        <div class="memo-card__footer">
          <span class="memo-card__date">${formatDate(memo.id)}</span>
          <div class="card-actions">
            <button class="btn-edit" data-id="${memo.id}">編集</button>
            <button class="btn-delete" data-id="${memo.id}">削除</button>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function resetForm() {
    editingId = null;
    document.getElementById('memo-title').value = '';
    document.getElementById('memo-body').innerHTML = '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('form-title').textContent = '新しいメモを追加';
    document.getElementById('btn-add').textContent = '追加する';
    document.getElementById('btn-cancel').style.display = 'none';
    document.getElementById('form-card').classList.remove('is-editing');
    updateToolbarState();
  }

  function startEdit(id) {
    const memo = loadMemos().find(m => m.id === id);
    if (!memo) return;
    editingId = id;
    document.getElementById('memo-title').value = memo.title;
    document.getElementById('memo-body').innerHTML = memo.body || '';
    document.getElementById('error-msg').textContent = '';
    document.getElementById('form-title').textContent = 'メモを編集';
    document.getElementById('btn-add').textContent = '更新する';
    document.getElementById('btn-cancel').style.display = 'block';
    document.getElementById('form-card').classList.add('is-editing');
    document.getElementById('form-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('memo-title').focus();
  }

  function submitForm() {
    const titleEl = document.getElementById('memo-title');
    const bodyEl  = document.getElementById('memo-body');
    const errorEl = document.getElementById('error-msg');

    const title = titleEl.value.trim();
    const body  = bodyEl.innerHTML.trim();

    if (!title) {
      errorEl.textContent = 'タイトルを入力してください。';
      titleEl.focus();
      return;
    }
    errorEl.textContent = '';

    if (editingId !== null) {
      if (!confirm('更新してもいいですか？')) return;
      const memos = loadMemos().map(m => m.id === editingId ? { ...m, title, body } : m);
      saveMemos(memos);
      resetForm();
    } else {
      const memos = loadMemos();
      memos.push({ id: Date.now(), title, body });
      saveMemos(memos);
      titleEl.value = '';
      bodyEl.innerHTML = '';
    }
    renderMemos();
  }

  function deleteMemo(id) {
    const memos = loadMemos().filter(m => m.id !== id);
    saveMemos(memos);
    if (editingId === id) resetForm();
    renderMemos();
  }

  /* --- Toolbar --- */
  function updateToolbarState() {
    document.querySelectorAll('.toolbar [data-cmd]').forEach(btn => {
      btn.classList.toggle('active', document.queryCommandState(btn.dataset.cmd));
    });
  }

  document.getElementById('toolbar').addEventListener('mousedown', e => {
    const btn = e.target.closest('[data-cmd]');
    if (!btn) return;
    e.preventDefault();
    document.execCommand(btn.dataset.cmd, false, null);
    updateToolbarState();
  });

  document.getElementById('color-picker').addEventListener('input', e => {
    document.getElementById('memo-body').focus();
    document.execCommand('foreColor', false, e.target.value);
  });

  document.getElementById('memo-body').addEventListener('keyup', updateToolbarState);
  document.getElementById('memo-body').addEventListener('mouseup', updateToolbarState);

  /* --- Other events --- */
  document.getElementById('btn-add').addEventListener('click', submitForm);
  document.getElementById('btn-cancel').addEventListener('click', resetForm);

  document.getElementById('memo-title').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitForm();
  });

  document.getElementById('memo-grid').addEventListener('click', e => {
    const delBtn  = e.target.closest('.btn-delete');
    const editBtn = e.target.closest('.btn-edit');
    if (delBtn && confirm('このメモを削除しますか？')) deleteMemo(Number(delBtn.dataset.id));
    if (editBtn) startEdit(Number(editBtn.dataset.id));
  });

  renderMemos();
</script>
</body>
</html>
